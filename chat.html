<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マミーちゃん</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <h1>Mami-chan ✨</h1>
    <div class="subtitle">heyy 💕 finally came to see me? what took you so long 😏</div>

    <div id="chatBox"></div>

    <div class="controls">
      <input id="userInput" type="text" placeholder="Talk to Mami-chan...">
      <button id="sendBtn">Send</button>
    </div>

    <button id="clearBtn" class="clear-btn">Clear Memory</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
